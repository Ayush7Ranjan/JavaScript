<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booleans</title>
</head>
<body>
    

    <script>
        true
        false

        // comparision operator
        console.log(3>5);

        console.log(5 === '5.00');

        // logical operator

        // and 
        console.log(true && false);
        console.log(0.2 >= 0 && 0.2 >=0.1);

        // or 
        console.log(true || false);

        // not 
        console.log(!true);
    </script>
</body>
</html>
